<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Pizza and More</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* GELBER HINTERGRUND WIE BEIM WAGYU RECHNER */
  background: linear-gradient(135deg, #0d0d0d 50%, #1a1a00 50%);

  color: white;
  font-family: Arial, sans-serif;
}

/* FIXED WIDTH */
.wrapper {
  display: grid;
  grid-template-columns: repeat(4, 400px);
  gap: 20px;
}

/* CONTAINER */
.container {
  background: rgba(20, 20, 0, 0.95);
  padding: 15px;
  border-radius: 15px;

  /* GELBER GLOW */
  box-shadow: 0 0 20px rgba(232, 214, 49, 0.25);

  border: 1px solid rgba(232, 214, 49, 0.2);
}

h2 {
  text-align: center;
  color: #e8d631;
  font-size: 22px;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 6px 0;
  font-size: 13px;
}

.controls {
  display: flex;
  gap: 4px;
}

/* BUTTONS */
button {
  width: 32px;
  height: 26px;

  border: 1px solid #e8d631;
  border-radius: 6px;

  background: #111100;
  color: #e8d631;

  cursor: pointer;
  font-size: 12px;

  transition: 0.2s;
}

button:hover {
  background: #e8d631;
  color: black;
}

.value {
  width: 35px;
  text-align: center;
  color: white;
}

/* RESET BUTTON */
.reset-btn {
  width: 100%;
  margin-top: 10px;
  padding: 8px;

  background: #222200;
  color: #e8d631;

  border: 1px solid #e8d631;
  border-radius: 8px;

  cursor: pointer;
}

.reset-btn:hover {
  background: #e8d631;
  color: black;
}

.result {
  text-align: center;
  margin-top: 10px;
  color: #e8d631;
}

.total {
  font-weight: bold;
  font-size: 20px;
}

hr {
  border: 0.5px solid rgba(232, 214, 49, 0.3);
  margin: 10px 0;
}
</style>
</head>

<body>

<div class="wrapper" id="app"></div>

<script>
const products = [
  ["Margarita", 150, "#dd1414"],
  ["Peperoni", 180, "#dd1414"],
  ["Salami", 180, "#dd1414"],
  ["Tonno", 220, "#dd1414"],

  ["Bolognese", 200, "#3e9b13"],
  ["Penne al Forno", 200, "#3e9b13"],
  ["Aglio Olio", 180, "#3e9b13"],

  ["Pizza Brötchen", 100, "#c42ec2"],
  ["Mozarella Sticks", 130, "#c42ec2"],

  ["Cola", 125, "#38c2c2"],
  ["Sprite", 100, "#38c2c2"],
  ["Fanta", 100, "#38c2c2"],
  ["Ice Tea Peach", 100, "#38c2c2"],

  ["Bier", 100, "#8657d0"],
  ["Radler", 90, "#8657d0"],
  ["Rotwein", 120, "#8657d0"],
  ["Weiswein", 120, "#8657d0"],

  ["Cafe", 80, "#1e6b6e"],
  ["Cappuccino", 80, "#1e6b6e"],
  ["Latte Macchiato", 85, "#1e6b6e"],
  ["Kakao", 50, "#1e6b6e"]
];

function createCalculator(id) {
  let html = `<div class="container"><h2>Kunde ${id}</h2>`;

  products.forEach((p, i) => {
    html += `
    <div class="item">
      <span style="color:${p[2]}">${p[0]} (${p[1]}$)</span>
      <div class="controls">
        <button onclick="change('${id}-${i}', -10)">-10</button>
        <button onclick="change('${id}-${i}', -1)">-</button>
        <div class="value" id="${id}-${i}">0</div>
        <button onclick="change('${id}-${i}', 1)">+</button>
        <button onclick="change('${id}-${i}', 10)">+10</button>
      </div>
    </div>`;
  });

  html += `
  <hr>

  <div class="item">
    <span style="color:#e8d631;">Rabatt (%)</span>
    <div class="controls">
      <button onclick="change('rabatt-${id}', -5)">-</button>
      <div class="value" id="rabatt-${id}">0</div>
      <button onclick="change('rabatt-${id}', 5)">+</button>
    </div>
  </div>

  <div class="result" id="gesamt-${id}">Gesamt: 0$</div>
  <div class="result total" id="endpreis-${id}">Endpreis: 0$</div>

  <button class="reset-btn" onclick="resetCalc(${id})">
    Rechner leeren
  </button>

  </div>`;

  return html;
}

document.getElementById("app").innerHTML =
  createCalculator(1) +
  createCalculator(2) +
  createCalculator(3) +
  createCalculator(4);

let values = {};

function change(id, amount) {
  if (!values[id]) values[id] = 0;

  values[id] += amount;

  if (values[id] < 0) values[id] = 0;

  if (id.includes("rabatt") && values[id] > 100) {
    values[id] = 100;
  }

  document.getElementById(id).innerText = values[id];

  berechnen();
}

function resetCalc(k) {
  products.forEach((_, i) => {
    values[`${k}-${i}`] = 0;
    document.getElementById(`${k}-${i}`).innerText = 0;
  });

  values[`rabatt-${k}`] = 0;
  document.getElementById(`rabatt-${k}`).innerText = 0;

  berechnen();
}

function berechnen() {
  for (let k = 1; k <= 4; k++) {

    let gesamt = 0;

    products.forEach((p, i) => {
      let val = values[`${k}-${i}`] || 0;
      gesamt += val * p[1];
    });

    let rabatt = values[`rabatt-${k}`] || 0;

    let endpreis = gesamt - (gesamt * rabatt / 100);

    document.getElementById(`gesamt-${k}`).innerText =
      "Gesamt: " + gesamt.toLocaleString() + "$";

    document.getElementById(`endpreis-${k}`).innerText =
      "Endpreis: " + endpreis.toLocaleString() + "$";
  }
}
</script>

</body>
</html>
